services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-environment}
      POSTGRES_USER: ${POSTGRES_USER:-environment}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-environment}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    image: python:3.10-slim
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "pip install -r requirements.txt && python scripts/init_database.py && uvicorn api.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-environment}:${POSTGRES_PASSWORD:-environment}@db:5432/${POSTGRES_DB:-environment}
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    image: python:3.10-slim
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "pip install -r requirements.txt && flask --app dashboard.app run --host 0.0.0.0 --port 8501"
    environment:
      ENVIRONMENT_API_URL: http://api:8000
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - api

volumes:
  postgres_data:
